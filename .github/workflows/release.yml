name: Publish release

on:
  push:
    branches: [main]
    paths:
      - VERSION
      - CHANGELOG.md
      - .github/workflows/release.yml
  workflow_dispatch:

concurrency:
  group: publish-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION="$(tr -d '\r\n' < VERSION)"
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid VERSION: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "zip=dist/continuity-director-v$VERSION.zip" >> "$GITHUB_OUTPUT"
          echo "checksum=dist/continuity-director-v$VERSION.zip.sha256" >> "$GITHUB_OUTPUT"
          echo "notes=docs/releases/v$VERSION.md" >> "$GITHUB_OUTPUT"
      - name: Compile
        run: python -m compileall -q .
      - name: Maintainer health
        run: python scripts/maintainer_health.py
      - name: ComfyUI lifecycle smoke
        run: python scripts/smoke_import.py
      - name: Unit tests
        run: PYTHONPATH=tests python -m unittest discover -s tests -p "test_*.py"
      - name: Release validation
        run: python scripts/validate_release.py
      - name: Frontend validation
        run: |
          for file in js/*.js; do node --check "$file"; done
          node tests/frontend_smoke.mjs
          node tests/reliability_frontend_smoke.mjs
      - name: Build installable ZIP
        run: python scripts/build_release.py
      - name: Generate SHA-256 checksum
        env:
          VERSION: ${{ steps.version.outputs.version }}
        run: |
          cd dist
          sha256sum "continuity-director-v${VERSION}.zip" > "continuity-director-v${VERSION}.zip.sha256"
      - name: Verify release notes
        env:
          NOTES: ${{ steps.version.outputs.notes }}
        run: test -s "$NOTES"
      - name: Publish GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          target_commitish: ${{ github.sha }}
          name: Continuity Director v${{ steps.version.outputs.version }}
          body_path: ${{ steps.version.outputs.notes }}
          prerelease: true
          fail_on_unmatched_files: true
          files: |
            ${{ steps.version.outputs.zip }}
            ${{ steps.version.outputs.checksum }}
      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: continuity-director-v${{ steps.version.outputs.version }}
          path: |
            ${{ steps.version.outputs.zip }}
            ${{ steps.version.outputs.checksum }}
          if-no-files-found: error
          retention-days: 90
