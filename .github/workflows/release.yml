name: Build release package
on:
  workflow_dispatch:
  push:
    tags: ["v*"]
permissions:
  contents: read
jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Verify package import
        run: python scripts/smoke_import.py
      - name: Run tests
        run: PYTHONPATH=tests python -m unittest discover -s tests -p "test_*.py"
      - name: Build installable zip
        run: python scripts/build_release.py
      - uses: actions/upload-artifact@v4
        with:
          name: continuity-director-v0.8.21
          path: dist/continuity-director-v0.8.21.zip
          if-no-files-found: error
