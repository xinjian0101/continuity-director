name: Feature request
description: Propose a focused production, node, interface, reliability, or documentation improvement
title: "[Feature]: "
labels: ["enhancement", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        Describe the production problem first. Solutions that preserve deterministic behavior and workflow compatibility are preferred.
  - type: textarea
    id: problem
    attributes:
      label: Production problem
      description: What workflow limitation or repeated failure are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed behavior
      description: Describe the node, interface, data, or documentation behavior you expect.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Continuity locks
        - Directing
        - Quality control
        - Runtime planning
        - Collaboration
        - Export and packaging
        - Reliability
        - Dashboard and localization
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: example
    attributes:
      label: Example workflow
      description: Provide a concise example showing how the proposed feature would be used.
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility considerations
      description: Note any existing node IDs, workflow fields, schemas, or interfaces that could be affected.
  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues and pull requests.
          required: true
        - label: This request does not require storing credentials or executing imported configuration.
          required: true
